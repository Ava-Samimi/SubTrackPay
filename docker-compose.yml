version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: billing
      TZ: America/Montreal
    ports:
      - "5432:5432"
    volumes:
      - billing_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d billing"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    build: ./server
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/billing?schema=public
      PORT: "3001"
      TZ: America/Montreal
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -lc "
        echo 'Waiting for database to be fully ready...';
        sleep 2;
        for i in 1 2 3 4 5; do
          npx prisma migrate deploy && break;
          echo \"Migration attempt $${i} failed, retrying in 3s...\";
          sleep 3;
        done
      "
    restart: "no"

  seeder:
    build: ./server/seeder
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/billing?schema=public
      SEED_CUSTOMERS: "500"
      SEED_PACKAGES: "5"
      SEED_SUBSCRIPTIONS: "500"
      SEED_RANDOM_SEED: "0"
      SEED_SKIP_IF_EXISTS: "1"
      SEED_DISTRIBUTION: "uniform"
      DATA_DIR: /app/data
      TZ: America/Montreal
      SCHEMA_PRISMA: /app/prisma/schema.prisma
      OUT_JSON: /app/data/db-info/db_schema.json
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./server/prisma:/app/prisma:ro
      - ./server/seeder/prisma_schema_to_json.py:/app/prisma_schema_to_json.py:ro
      - ./client/public/snapshots:/app/client/public/snapshots
    command: ["sh", "-lc", "python /app/prisma_schema_to_json.py && python /app/seed_db.py"]
    restart: "no"

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/billing?schema=public
      PORT: "3001"
      DATA_DIR: /app/data
      TZ: America/Montreal
      FIREBASE_SERVICE_ACCOUNT_JSON: /run/secrets/firebase-service-account.json
    volumes:
      - ./server/secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
      - ./data:/app/data
      - ./server/exports:/app/exports
      - ./server/seeder:/app/seeder:ro
      - ./server/seeder/seed_db.py:/app/seed_db.py:ro
      - ./client/public/snapshots:/app/client/public/snapshots
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seeder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health | grep -q ok"]
      interval: 3s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  web:
    build: ./client
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:3001
      TZ: America/Montreal
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped

volumes:
  billing_db_data: